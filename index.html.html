<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crew Planner Web</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#f4f6f8;--card:#fff;--text:#172033;--muted:#667085;--line:#d8dee8;--blue:#1f4e78}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--blue);color:#fff;padding:16px;position:sticky;top:0;z-index:4}
header h1{margin:0;font-size:22px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
button,select,input{font:inherit;border:1px solid var(--line);border-radius:8px;padding:9px 12px;background:#fff}
button{cursor:pointer;font-weight:700}.primary{background:#fff;color:var(--blue)}
main{max-width:1200px;margin:auto;padding:16px}.notice{background:#fff3cd;border:1px solid #ffe69c;padding:12px;border-radius:10px;margin-bottom:14px}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kpi,.zone,.personal{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.kpi b{font-size:22px;display:block}.kpi span{color:var(--muted);font-size:13px}
.zones{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.zone h2{margin:0 -14px 10px;padding:10px 14px;font-size:18px}
.pro h2{background:#f4cccc}.rookie h2{background:#d9ead3}.two h2{background:#cfe2f3}.standby h2{background:#fff2cc}.tt h2{background:#fce5cd}
.shift{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px 0;border-bottom:1px solid #eef1f5}.shift:last-child{border:0}.time{font-weight:700}
.empty{color:var(--muted);font-style:italic}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.personal{margin-top:14px}.personal h2{margin-top:0}.day-group{margin:12px 0}.day-group h3{margin:0 0 6px;color:var(--blue)}
body.dark{--bg:#111827;--card:#1f2937;--text:#f9fafb;--muted:#cbd5e1;--line:#374151}
@media(max-width:750px){.zones,.kpis{grid-template-columns:1fr}.shift{grid-template-columns:1fr}.toolbar{align-items:stretch}button,select{width:100%}}
@media print{header,.notice,.filters{display:none}body{background:#fff}main{max-width:none}.zone,.kpi,.personal{break-inside:avoid}}
</style>
</head>
<body>
<header>
<h1>Crew Planner Web</h1>
<div class="toolbar">
<button class="primary" id="loadBtn">Excel laden</button>
<button class="primary" id="reloadBtn">Opnieuw laden</button>
<button class="primary" onclick="window.print()">Afdrukken</button>
<button class="primary" id="darkBtn">Donkere modus</button>
<input id="fileInput" type="file" accept=".xlsx,.xlsm,.xls" hidden>
</div>
</header>
<main>
<div class="notice" id="notice">Open het opgeslagen Crew Planner Excel-bestand. Na wijzigingen: Excel opslaan en hier op <b>Opnieuw laden</b> klikken.</div>
<div class="filters">
<select id="dateSelect"><option>Datum kiezen</option></select>
<select id="employeeSelect"><option value="">Iedereen</option></select>
</div>
<div class="kpis">
<div class="kpi"><b id="kpiDate">–</b><span>Gekozen dag</span></div>
<div class="kpi"><b id="kpiPeople">0</b><span>Medewerkers</span></div>
<div class="kpi"><b id="kpiHours">0</b><span>Totale uren</span></div>
<div class="kpi"><b id="kpiBlocks">0</b><span>Werkblokken</span></div>
</div>
<div class="zones">
<section class="zone pro"><h2>PRO</h2><div id="PRO"></div></section>
<section class="zone rookie"><h2>ROOKIE</h2><div id="ROOKIE"></div></section>
<section class="zone two"><h2>2.0</h2><div id="2.0"></div></section>
<section class="zone standby"><h2>STAND-BY</h2><div id="STANDBY"></div></section>
<section class="zone tt"><h2>TT / OVERIG</h2><div id="TT / OVERIG"></div></section>
</div>
<section class="personal" id="personal"><h2>Persoonlijke planning</h2><div id="personalContent" class="empty">Kies een medewerker.</div></section>
</main>
<script>
let lastFile=null, rows=[];
const $=id=>document.getElementById(id);
$("loadBtn").onclick=()=>$("fileInput").click();
$("reloadBtn").onclick=()=>{ if(lastFile) parseFile(lastFile); else $("fileInput").click(); };
$("darkBtn").onclick=()=>document.body.classList.toggle("dark");
$("fileInput").onchange=e=>{lastFile=e.target.files[0]; if(lastFile) parseFile(lastFile);};
$("dateSelect").onchange=render;
$("employeeSelect").onchange=renderPersonal;

function excelDate(v){
 if(v instanceof Date) return v;
 if(typeof v==="number"){
  const d=XLSX.SSF.parse_date_code(v); return d?new Date(d.y,d.m-1,d.d):null;
 }
 if(typeof v==="string" && v){ const d=new Date(v); return isNaN(d)?null:d; }
 return null;
}
function timeText(v){
 if(v instanceof Date) return String(v.getHours()).padStart(2,"0")+":"+String(v.getMinutes()).padStart(2,"0");
 if(typeof v==="number"){ let m=Math.round(v*1440)%1440; return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}
 return v||"";
}
function dateKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dateLabel(key){const d=new Date(key+"T12:00:00");return d.toLocaleDateString("nl-BE",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
function addBlock(sheet,zone,range){
 const data=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,range});
 data.forEach(r=>{
  const d=excelDate(r[0]), name=r[1], start=r[2], end=r[3], active=r[6];
  if(d && name && start!=="" && end!=="" && active!=="Nee"){
   rows.push({date:dateKey(d),zone,name:String(name),start:timeText(start),end:timeText(end),
     hours:((typeof end==="number"&&typeof start==="number")?Math.round((end-start)*240)/10:0)});
  }
 });
}
function parseFile(file){
 const reader=new FileReader();
 reader.onload=e=>{
  try{
   const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
   const sh=wb.Sheets["Planning"];
   if(!sh) throw new Error("Tabblad Planning niet gevonden.");
   rows=[];
   addBlock(sh,"PRO","A6:H55");
   addBlock(sh,"ROOKIE","J6:Q55");
   addBlock(sh,"2.0","A61:H110");
   addBlock(sh,"STANDBY","J61:Q110");
   addBlock(sh,"TT / OVERIG","A116:H145");
   rows.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start)||a.zone.localeCompare(b.zone));
   setupFilters();
   $("notice").textContent="Geladen: "+file.name+" — "+rows.length+" werkblokken.";
  }catch(err){$("notice").textContent="Fout: "+err.message;}
 };
 reader.readAsArrayBuffer(file);
}
function setupFilters(){
 const dates=[...new Set(rows.map(r=>r.date))].sort();
 $("dateSelect").innerHTML=dates.map(d=>`<option value="${d}">${dateLabel(d)}</option>`).join("");
 const people=[...new Set(rows.map(r=>r.name))].sort();
 $("employeeSelect").innerHTML='<option value="">Iedereen</option>'+people.map(p=>`<option>${p}</option>`).join("");
 if(dates.length) $("dateSelect").value=dates[0];
 render();
}
function render(){
 const date=$("dateSelect").value;
 const day=rows.filter(r=>r.date===date);
 ["PRO","ROOKIE","2.0","STANDBY","TT / OVERIG"].forEach(zone=>{
  const el=$(zone), z=day.filter(r=>r.zone===zone).sort((a,b)=>a.start.localeCompare(b.start));
  el.innerHTML=z.length?z.map(r=>`<div class="shift"><span>${r.name}</span><span class="time">${r.start}–${r.end}</span></div>`).join(""):'<div class="empty">Nog niemand ingepland</div>';
 });
 $("kpiDate").textContent=date?dateLabel(date):"–";
 $("kpiPeople").textContent=new Set(day.map(r=>r.name)).size;
 $("kpiHours").textContent=(Math.round(day.reduce((s,r)=>s+r.hours,0)*10)/10).toLocaleString("nl-BE");
 $("kpiBlocks").textContent=day.length;
 renderPersonal();
}
function renderPersonal(){
 const person=$("employeeSelect").value;
 if(!person){$("personalContent").innerHTML='<div class="empty">Kies een medewerker.</div>';return;}
 const list=rows.filter(r=>r.name===person);
 const grouped={}; list.forEach(r=>(grouped[r.date]??=[]).push(r));
 $("personalContent").innerHTML=Object.keys(grouped).sort().map(d=>`
  <div class="day-group"><h3>${dateLabel(d)}</h3>
  ${grouped[d].sort((a,b)=>a.start.localeCompare(b.start)).map(r=>`<div class="shift"><span>${r.zone}</span><span class="time">${r.start}–${r.end}</span></div>`).join("")}
  </div>`).join("")||'<div class="empty">Geen planning gevonden.</div>';
}
</script>
</body>
</html>
