<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#123e5a">
<title>CableCrew Lakeside</title>
<style>
:root{--navy:#123e5a;--aqua:#21b6b6;--bg:#f4f7f9;--card:#fff;--text:#17212b;--muted:#667085;--line:#d9e1e7}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
header{background:linear-gradient(135deg,var(--navy),#17617b);color:white;padding:18px 16px}
.brand{max-width:1100px;margin:auto;display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand h1{margin:0;font-size:24px}.brand small{opacity:.85}
main{max-width:1100px;margin:auto;padding:16px}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
select,button{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font:inherit}
button{cursor:pointer;font-weight:bold}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kpi,.zone,.personal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(19,62,90,.05)}
.kpi b{display:block;font-size:22px}.kpi span{color:var(--muted);font-size:13px}
.zones{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.zone h2{margin:-14px -14px 10px;padding:10px 14px;border-radius:14px 14px 0 0;font-size:18px}
.pro h2{background:#f4cccc}.rookie h2{background:#d9ead3}.two h2{background:#cfe2f3}.standby h2{background:#fff2cc}.tt h2{background:#fce5cd}
.shift{display:grid;grid-template-columns:1fr auto;gap:10px;padding:9px 0;border-bottom:1px solid #edf1f4}.shift:last-child{border:0}.time{font-weight:700}
.empty{color:var(--muted);font-style:italic}.personal{margin-top:14px}.personal h2{margin-top:0}.day{margin:14px 0}.day h3{color:var(--navy);margin-bottom:6px}
#status{background:#e8f7f7;border:1px solid #a7dddd;padding:10px 12px;border-radius:10px;margin-bottom:14px}
@media(max-width:700px){.zones,.summary{grid-template-columns:1fr}.brand{align-items:flex-start;flex-direction:column}.controls select,.controls button{width:100%}}
@media print{header,.controls,#status{display:none}body{background:white}.zone,.personal,.kpi{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<header><div class="brand"><div><h1>⚡ CableCrew Lakeside</h1><small>Crew planning</small></div><div id="updated"></div></div></header>
<main>
<div id="status">Planning laden…</div>
<div class="controls">
<select id="date"><option>Datum kiezen</option></select>
<select id="employee"><option value="">Volledige planning</option></select>
<button onclick="window.print()">Afdrukken</button>
</div>
<div class="summary">
<div class="kpi"><b id="people">0</b><span>Medewerkers</span></div>
<div class="kpi"><b id="blocks">0</b><span>Werkblokken</span></div>
<div class="kpi"><b id="hours">0</b><span>Totale uren</span></div>
</div>
<div class="zones">
<section class="zone pro"><h2>PRO</h2><div id="PRO"></div></section>
<section class="zone rookie"><h2>ROOKIE</h2><div id="ROOKIE"></div></section>
<section class="zone two"><h2>2.0</h2><div id="2.0"></div></section>
<section class="zone standby"><h2>STAND-BY</h2><div id="STANDBY"></div></section>
<section class="zone tt"><h2>TT / OVERIG</h2><div id="TT / OVERIG"></div></section>
</div>
<section class="personal"><h2>Mijn planning</h2><div id="personal" class="empty">Kies bovenaan een medewerker.</div></section>
</main>
<script>
let shifts=[];
const $=id=>document.getElementById(id);
const dateLabel=k=>new Date(k+"T12:00:00").toLocaleDateString("nl-BE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const minutes=t=>{const [h,m]=t.split(":").map(Number);return h*60+m};
const hours=s=>Math.max(0,(minutes(s.end)-minutes(s.start))/60);
fetch("planning.json?"+Date.now()).then(r=>{if(!r.ok)throw Error("planning.json niet gevonden");return r.json()}).then(data=>{
 shifts=(data.shifts||[]).sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
 $("updated").textContent="Bijgewerkt: "+(data.updated||"");
 const dates=[...new Set(shifts.map(x=>x.date))].sort();
 $("date").innerHTML=dates.map(d=>`<option value="${d}">${dateLabel(d)}</option>`).join("");
 const people=[...new Set(shifts.map(x=>x.employee))].sort();
 $("employee").innerHTML='<option value="">Volledige planning</option>'+people.map(p=>`<option>${p}</option>`).join("");
 $("date").onchange=render;$("employee").onchange=renderPersonal;
 $("status").textContent="Planning geladen.";
 render();
}).catch(e=>$("status").textContent="Fout: "+e.message);

function render(){
 const d=$("date").value, day=shifts.filter(x=>x.date===d);
 ["PRO","ROOKIE","2.0","STANDBY","TT / OVERIG"].forEach(z=>{
   const list=day.filter(x=>x.zone===z).sort((a,b)=>a.start.localeCompare(b.start));
   $(z).innerHTML=list.length?list.map(x=>`<div class="shift"><span>${x.employee}</span><span class="time">${x.start}–${x.end}</span></div>`).join(""):'<div class="empty">Nog niemand ingepland</div>';
 });
 $("people").textContent=new Set(day.map(x=>x.employee)).size;
 $("blocks").textContent=day.length;
 $("hours").textContent=(Math.round(day.reduce((a,x)=>a+hours(x),0)*10)/10).toLocaleString("nl-BE");
 renderPersonal();
}
function renderPersonal(){
 const p=$("employee").value;
 if(!p){$("personal").innerHTML='<div class="empty">Kies bovenaan een medewerker.</div>';return}
 const list=shifts.filter(x=>x.employee===p);
 const by={};list.forEach(x=>(by[x.date]??=[]).push(x));
 $("personal").innerHTML=Object.keys(by).sort().map(d=>`<div class="day"><h3>${dateLabel(d)}</h3>${by[d].sort((a,b)=>a.start.localeCompare(b.start)).map(x=>`<div class="shift"><span>${x.zone}</span><span class="time">${x.start}–${x.end}</span></div>`).join("")}</div>`).join("");
}
</script>
</body>
</html>
